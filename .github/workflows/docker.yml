name: "Users Management CI Flow"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # השורה החדשה שאומרת לגיטהאב לעבוד בתוך התיקייה הנכונה:
    defaults:
      run:
        working-directory: users-management

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Run Build
      run: npm run build --if-present